<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ajota.system 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
  :root {
    --bg:          #f5f0e8;
    --bg-card:     rgba(250,247,241,0.92);
    --ink:         #1a1612;
    --ink-dim:     #6b6157;
    --ink-faint:   #c8bfb0;
    --accent:      #c17f4a; 
    --magenta:     #c94f8a; 
    --font-sans: "Outfit", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "DM Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-sans); overflow: hidden; }
  
  #webgl-container { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

  /* ---------------- HUD ---------------- */
  .hud { position: fixed; z-index: 10; color: var(--ink-dim); font-size: 11px; letter-spacing: .10em; text-transform: uppercase; font-weight: 500; user-select: none; pointer-events: none; }
  .hud b { color: var(--ink); font-weight: 600; }
  .hud .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-right: 8px; vertical-align: middle; animation: pulse 2.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }

  #hud-tl { top: 22px; left: 28px; }
  #hud-tl .name { display: flex; align-items: center; gap: 10px; }
  #hud-tl .sub { margin-top: 6px; color: var(--ink-faint); font-size: 10px; }

  #hud-tr { top: 22px; right: 28px; text-align: right; }
  #hud-tr .row { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
  #hud-tr .coord { font-family: var(--font-mono); font-size: 10px; color: var(--ink-dim); letter-spacing: .08em; text-transform: none; }

  #hud-bl { bottom: 22px; left: 28px; max-width: 320px; line-height: 1.7; }
  #hud-bl kbd { display: inline-block; font-family: var(--font-mono); font-size: 10px; border: 1px solid var(--ink-faint); padding: 2px 6px; border-radius: 3px; color: var(--ink); margin: 0 2px; background: rgba(255,255,255,.02); }

  #hud-br { bottom: 22px; right: 28px; text-align: right; font-family: var(--font-mono); font-size: 10px; text-transform: none; letter-spacing: .04em; color: var(--ink-faint); }
  
  #label { position: fixed; z-index: 9; pointer-events: none; opacity: 0; transform: translate(-50%, calc(-100% - 20px)); transition: opacity .15s ease; font-family: var(--font-mono); font-size: 11px; color: var(--ink); letter-spacing: .10em; text-transform: uppercase; white-space: nowrap; }
  #label .tag { display: block; color: var(--accent); font-size: 9px; margin-bottom: 3px; opacity: .9; }
  #label.show { opacity: 1; }

  #preview { position: fixed; z-index: 40; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(.96); opacity: 0; pointer-events: none; transition: all .25s ease; font-family: var(--font-sans); width: 400px; background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--ink-faint); border-radius: 12px; padding: 28px; box-shadow: 0 20px 60px rgba(26,22,18,.12); }
  #preview.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
  #preview h2 { margin: 0 0 10px; font-size: 28px; color: var(--ink); }
  #preview p { color: var(--ink-dim); font-size: 14px; line-height: 1.6; margin-bottom: 22px; }
  #preview button { background: transparent; border: 1px solid var(--ink-faint); padding: 10px 15px; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 10px; color: var(--ink); }

  #backdrop { position: fixed; inset: 0; z-index: 20; background: rgba(245,240,232,0.6); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .2s; }
  #backdrop.show { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>

<div id="webgl-container"></div>

<aside id="hud-tl" class="hud">
  <div class="name"><span class="dot"></span><b>ajota.system</b></div>
  <div class="sub">v.3.0 · webgl physics engine</div>
</aside>
<aside id="hud-tr" class="hud">
  <div class="row"><span class="coord" id="coord">[ Z: 300 ]</span></div>
  <div class="row" style="margin-top:6px"><span>online</span><span class="dot"></span></div>
</aside>
<aside id="hud-bl" class="hud">
  <div><kbd>scroll</kbd> navegar 3D · <kbd>click + arrastrar</kbd> pan / físicas</div>
</aside>
<aside id="hud-br" class="hud"><div>made in madrid</div></aside>

<div id="label"><span class="tag" id="label-tag">// project</span><span id="label-name">name</span></div>
<div id="backdrop"></div>

<section id="preview">
  <h2 id="pv-title">Proyecto</h2>
  <p id="pv-desc">Haz clic en un planeta para ver su información o ir a su enlace.</p>
  <button id="pv-close">Cerrar modal</button>
</section>

<script>
(() => {
  'use strict';

  // 1. CONFIGURACIÓN THREE.JS
  const container = document.getElementById('webgl-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf5f0e8);
  scene.fog = new THREE.Fog(0xf5f0e8, 200, 800);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  let targetCamZ = 300;
  
  // Variables de paneo. Iniciamos con el plano desplazado (Sol a la izquierda)
  const panOffset = new THREE.Vector3(60, 0, 0); 
  const targetPan = new THREE.Vector3(60, 0, 0);
  camera.position.set(panOffset.x, panOffset.y, targetCamZ);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  // 2. ILUMINACIÓN PREMIUM
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  const topLight = new THREE.DirectionalLight(0xffffff, 0.5);
  topLight.position.set(100, 200, 100);
  scene.add(topLight);

  // 3. OBJETOS
  const planets = [];
  const planetData = [
    { id: 'gastos', name: 'GastOS', tag: '// 01', size: 12, color: 0xc17f4a, orbit: 60, speed: 0.005 },
    { id: 'github', name: 'GitHub', tag: '// 02', size: 10, color: 0x4a5568, orbit: 100, speed: 0.003 },
    { id: 'tfg', name: 'TFG', tag: '// 03', size: 15, color: 0x7b8fa8, orbit: 150, speed: 0.002 },
    { id: 'gaming', name: 'Stats', tag: '// 04', size: 9, color: 0x7a9e7e, orbit: 200, speed: 0.004 },
    { id: 'terminal', name: 'Terminal', tag: '// 05', size: 14, color: 0xa07898, orbit: 250, speed: 0.0015 },
  ];

  // Sol con material emisivo cálido
  const sunGeometry = new THREE.SphereGeometry(20, 32, 32);
  const sunMaterial = new THREE.MeshStandardMaterial({ 
    color: 0xfaf7f1, 
    emissive: 0xc17f4a,
    emissiveIntensity: 0.4,
    roughness: 0.8
  });
  const sun = new THREE.Mesh(sunGeometry, sunMaterial);
  scene.add(sun);

  // Luz puntual central para iluminar planetas desde el sol
  const pointLight = new THREE.PointLight(0xffeacc, 1.0, 500);
  scene.add(pointLight);

  // Anillos
  planetData.forEach(data => {
    const ringGeo = new THREE.RingGeometry(data.orbit - 0.5, data.orbit + 0.5, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x1a1612, opacity: 0.08, transparent: true, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
  });

  // Planetas con material físico
  const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
  planetData.forEach((data) => {
    const material = new THREE.MeshPhysicalMaterial({
      color: data.color, roughness: 0.3, metalness: 0.1, clearcoat: 0.5, clearcoatRoughness: 0.2
    });
    const planet = new THREE.Mesh(sphereGeometry, material);
    planet.scale.set(data.size, data.size, data.size);
    
    // Posición inicial en la órbita
    const initialAngle = Math.random() * Math.PI * 2;
    planet.position.x = Math.cos(initialAngle) * data.orbit;
    planet.position.z = Math.sin(initialAngle) * data.orbit;
    
    planet.userData = { ...data, angle: initialAngle, vx: 0, vy: 0, vz: 0 };
    scene.add(planet);
    planets.push(planet);
  });

  // 4. INTERACCIÓN Y FÍSICAS
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hoveredPlanet = null;
  
  let isDragging = false;
  let isPanning = false;
  let draggedPlanet = null;
  let previousMouse = { x: 0, y: 0 };

  const labelEl = document.getElementById('label');

  window.addEventListener('mousedown', (e) => {
    if (hoveredPlanet) {
      isDragging = true;
      draggedPlanet = hoveredPlanet;
      // Detener inercia al agarrar
      draggedPlanet.userData.vx = 0;
      draggedPlanet.userData.vy = 0;
      draggedPlanet.userData.vz = 0;
    } else {
      isPanning = true;
    }
    previousMouse = { x: e.clientX, y: e.clientY };
  });

  window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    const deltaX = e.clientX - previousMouse.x;
    const deltaY = e.clientY - previousMouse.y;

    if (isDragging && draggedPlanet) {
      document.body.style.cursor = 'grabbing';
      const factor = targetCamZ / 800; // Sensibilidad basada en el zoom
      draggedPlanet.position.x += deltaX * factor;
      draggedPlanet.position.y -= deltaY * factor;
      
      draggedPlanet.userData.vx = deltaX * factor * 0.5;
      draggedPlanet.userData.vy = -deltaY * factor * 0.5;
      
    } else if (isPanning) {
      document.body.style.cursor = 'grabbing';
      const factor = targetCamZ / 800;
      targetPan.x -= deltaX * factor;
      targetPan.y += deltaY * factor;
      
    } else {
      // Paralaje sutil con el ratón cuando no arrastramos
      targetPan.x += (mouse.x * 10 - targetPan.x) * 0.05;
      targetPan.y += (mouse.y * 10 - targetPan.y) * 0.05;

      // Raycast para Hover
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(planets);
      if (intersects.length > 0) {
        hoveredPlanet = intersects[0].object;
        document.body.style.cursor = 'grab';
        labelEl.classList.add('show');
        labelEl.style.left = e.clientX + 'px';
        labelEl.style.top = e.clientY + 'px';
        document.getElementById('label-name').textContent = hoveredPlanet.userData.name;
        document.getElementById('label-tag').textContent = hoveredPlanet.userData.tag;
      } else {
        hoveredPlanet = null;
        document.body.style.cursor = 'default';
        labelEl.classList.remove('show');
      }
    }
    previousMouse = { x: e.clientX, y: e.clientY };
  });

  window.addEventListener('mouseup', () => {
    if (isDragging && draggedPlanet) {
      // Abrir modal si fue un "clic" (movimiento casi nulo)
      if (Math.abs(draggedPlanet.userData.vx) < 0.5 && Math.abs(draggedPlanet.userData.vy) < 0.5) {
        document.getElementById('pv-title').textContent = draggedPlanet.userData.name;
        document.getElementById('backdrop').classList.add('show');
        document.getElementById('preview').classList.add('show');
      }
    }
    isDragging = false;
    draggedPlanet = null;
    isPanning = false;
    document.body.style.cursor = 'default';
  });

  window.addEventListener('wheel', (e) => {
    targetCamZ += e.deltaY * 0.3;
    targetCamZ = Math.max(10, Math.min(targetCamZ, 400));
    document.getElementById('coord').textContent = `[ Z: ${Math.round(targetCamZ)} ]`;
  });

  document.getElementById('pv-close').addEventListener('click', () => {
    document.getElementById('backdrop').classList.remove('show');
    document.getElementById('preview').classList.remove('show');
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // 5. ANIMACIÓN Y FÍSICAS
  function animate() {
    requestAnimationFrame(animate);

    // Cámara fluida
    camera.position.z += (targetCamZ - camera.position.z) * 0.08;
    panOffset.lerp(targetPan, 0.1);
    camera.position.x = panOffset.x;
    camera.position.y = panOffset.y;
    camera.lookAt(panOffset.x, panOffset.y, 0);

    // Órbitas y Físicas
    planets.forEach(planet => {
      const data = planet.userData;
      
      if (draggedPlanet !== planet) {
        data.angle += data.speed;
        const targetX = Math.cos(data.angle) * data.orbit;
        const targetZ = Math.sin(data.angle) * data.orbit;
        const targetY = 0; 
        
        // Efecto resorte elástico
        const fx = (targetX - planet.position.x) * 0.015;
        const fy = (targetY - planet.position.y) * 0.015;
        const fz = (targetZ - planet.position.z) * 0.015;

        data.vx = (data.vx || 0) + fx;
        data.vy = (data.vy || 0) + fy;
        data.vz = (data.vz || 0) + fz;

        // Fricción
        data.vx *= 0.94;
        data.vy *= 0.94;
        data.vz *= 0.94;

        planet.position.x += data.vx;
        planet.position.y += data.vy;
        planet.position.z += data.vz;
      }

      planet.rotation.y += 0.01;
      planet.rotation.x += 0.005;
    });

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
