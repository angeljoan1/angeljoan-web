<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ajota.system 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
  :root {
    --bg:          #f5f0e8;
    --bg-card:     rgba(250,247,241,0.92);
    --ink:         #1a1612;
    --ink-dim:     #6b6157;
    --ink-faint:   #c8bfb0;
    --accent:      #c17f4a; 
    --magenta:     #c94f8a; 
    --font-sans: "Outfit", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "DM Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-sans); overflow: hidden; }
  
  /* El canvas de WebGL */
  #webgl-container { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

  /* ---------------- HUD (Se mantiene intacto) ---------------- */
  .hud { position: fixed; z-index: 10; color: var(--ink-dim); font-size: 11px; letter-spacing: .10em; text-transform: uppercase; font-weight: 500; user-select: none; pointer-events: none; }
  .hud b { color: var(--ink); font-weight: 600; }
  .hud .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-right: 8px; vertical-align: middle; animation: pulse 2.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }

  #hud-tl { top: 22px; left: 28px; }
  #hud-tl .name { display: flex; align-items: center; gap: 10px; }
  #hud-tl .sub { margin-top: 6px; color: var(--ink-faint); font-size: 10px; }

  #hud-tr { top: 22px; right: 28px; text-align: right; }
  #hud-tr .row { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
  #hud-tr .coord { font-family: var(--font-mono); font-size: 10px; color: var(--ink-dim); letter-spacing: .08em; text-transform: none; }

  #hud-bl { bottom: 22px; left: 28px; max-width: 320px; line-height: 1.7; }
  #hud-bl kbd { display: inline-block; font-family: var(--font-mono); font-size: 10px; border: 1px solid var(--ink-faint); padding: 2px 6px; border-radius: 3px; color: var(--ink); margin: 0 2px; background: rgba(255,255,255,.02); }

  #hud-br { bottom: 22px; right: 28px; text-align: right; font-family: var(--font-mono); font-size: 10px; text-transform: none; letter-spacing: .04em; color: var(--ink-faint); }
  
  #label { position: fixed; z-index: 9; pointer-events: none; opacity: 0; transform: translate(-50%, calc(-100% - 20px)); transition: opacity .15s ease; font-family: var(--font-mono); font-size: 11px; color: var(--ink); letter-spacing: .10em; text-transform: uppercase; white-space: nowrap; }
  #label .tag { display: block; color: var(--accent); font-size: 9px; margin-bottom: 3px; opacity: .9; }
  #label.show { opacity: 1; }

  /* Modales simplificados para no atascar el código */
  #preview, #terminal { position: fixed; z-index: 40; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(.96); opacity: 0; pointer-events: none; transition: all .25s ease; font-family: var(--font-mono); }
  #preview.show, #terminal.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
  
  #preview { width: 400px; background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--ink-faint); border-radius: 12px; padding: 28px; font-family: var(--font-sans); }
  #preview h2 { margin: 0 0 10px; font-size: 28px; color: var(--ink); }
  #preview button { background: transparent; border: 1px solid var(--ink-faint); padding: 10px 15px; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 10px; margin-top: 20px;}

  #backdrop { position: fixed; inset: 0; z-index: 20; background: rgba(245,240,232,0.6); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .2s; }
  #backdrop.show { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>

<div id="webgl-container"></div>

<aside id="hud-tl" class="hud">
  <div class="name"><span class="dot"></span><b>ajota.system</b></div>
  <div class="sub">v.3.0 · webgl engine</div>
</aside>
<aside id="hud-tr" class="hud">
  <div class="row"><span class="coord" id="coord">[ Z: 300 ]</span></div>
  <div class="row" style="margin-top:6px"><span>online</span><span class="dot"></span></div>
</aside>
<aside id="hud-bl" class="hud">
  <div><kbd>scroll</kbd> navegar 3D · <kbd>mover ratón</kbd> paralaje</div>
  <div><kbd>click</kbd> abrir nodos</div>
</aside>
<aside id="hud-br" class="hud"><div>made in madrid</div></aside>

<div id="label"><span class="tag" id="label-tag">// project</span><span id="label-name">name</span></div>
<div id="backdrop"></div>

<section id="preview">
  <h2 id="pv-title">Proyecto</h2>
  <p id="pv-desc">Haz clic en un planeta para ver su información o ir a su enlace.</p>
  <button id="pv-close">Cerrar</button>
</section>

<script>
(() => {
  'use strict';

  // 1. CONFIGURACIÓN BÁSICA DE THREE.JS
  const container = document.getElementById('webgl-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf5f0e8); // El color crema de tu web
  scene.fog = new THREE.Fog(0xf5f0e8, 200, 800); // Niebla para ocultar cosas a lo lejos

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  let targetCamZ = 300; // Posición Z por defecto
  camera.position.set(0, 0, targetCamZ);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  // 2. ILUMINACIÓN (ESTUDIO / PREMIUM)
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // Luz general
  scene.add(ambientLight);

  const pointLight = new THREE.PointLight(0xfff7e6, 1.2, 500); // Luz desde el centro (El Sol)
  pointLight.position.set(0, 0, 0);
  scene.add(pointLight);

  const topLight = new THREE.DirectionalLight(0xffffff, 0.5); // Brillo desde arriba
  topLight.position.set(100, 200, 100);
  scene.add(topLight);

  // 3. CREACIÓN DE OBJETOS
  const planets = [];
  const planetData = [
    { id: 'gastos', name: 'GastOS', tag: '// 01', size: 12, color: 0xc17f4a, orbit: 60, speed: 0.005 },
    { id: 'github', name: 'GitHub', tag: '// 02', size: 10, color: 0x4a5568, orbit: 100, speed: 0.003 },
    { id: 'tfg', name: 'TFG', tag: '// 03', size: 15, color: 0x7b8fa8, orbit: 150, speed: 0.002 },
    { id: 'gaming', name: 'Stats', tag: '// 04', size: 9, color: 0x7a9e7e, orbit: 200, speed: 0.004 },
    { id: 'terminal', name: 'Terminal', tag: '// 05', size: 14, color: 0xa07898, orbit: 250, speed: 0.0015 },
  ];

  // El Sol (Núcleo) - Material básico para que no tenga sombras propias y parezca una interfaz pura
  const sunGeometry = new THREE.SphereGeometry(20, 32, 32);
  const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const sun = new THREE.Mesh(sunGeometry, sunMaterial);
  scene.add(sun);

  // Anillos orbitales
  planetData.forEach(data => {
    const ringGeo = new THREE.RingGeometry(data.orbit - 0.5, data.orbit + 0.5, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x1a1612, opacity: 0.05, transparent: true, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    // Tumbar los anillos ligeramente para dar aspecto 3D
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
  });

  // Los Planetas (Material Físico para que parezcan canicas de resina)
  const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
  
  planetData.forEach((data) => {
    const material = new THREE.MeshPhysicalMaterial({
      color: data.color,
      roughness: 0.3,
      metalness: 0.1,
      clearcoat: 0.5,
      clearcoatRoughness: 0.2
    });
    
    const planet = new THREE.Mesh(sphereGeometry, material);
    planet.scale.set(data.size, data.size, data.size);
    planet.userData = { ...data, angle: Math.random() * Math.PI * 2 };
    
    scene.add(planet);
    planets.push(planet);
  });

  // 4. INTERACCIÓN Y RAYCASTER
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hoveredPlanet = null;
  const labelEl = document.getElementById('label');

  window.addEventListener('mousemove', (e) => {
    // Normalizar coordenadas del ratón de -1 a 1 para Three.js
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    // Paralaje ligero de la cámara basado en el ratón
    camera.position.x += (mouse.x * 20 - camera.position.x) * 0.05;
    camera.position.y += (mouse.y * 20 - camera.position.y) * 0.05;

    // Lógica del hover de UI
    if (hoveredPlanet) {
      labelEl.classList.add('show');
      labelEl.style.left = e.clientX + 'px';
      labelEl.style.top = e.clientY + 'px';
      document.getElementById('label-name').textContent = hoveredPlanet.userData.name;
      document.getElementById('label-tag').textContent = hoveredPlanet.userData.tag;
      document.body.style.cursor = 'pointer';
    } else {
      labelEl.classList.remove('show');
      document.body.style.cursor = 'default';
    }
  });

  // 5. NAVEGACIÓN 3D (Scroll de profundidad)
  window.addEventListener('wheel', (e) => {
    // Ajustar objetivo Z según el scroll (viajar hacia adelante/atrás)
    targetCamZ += e.deltaY * 0.3;
    // Limitar cuán cerca y cuán lejos podemos ir (El sol está en Z=0)
    targetCamZ = Math.max(10, Math.min(targetCamZ, 400));
    document.getElementById('coord').textContent = `[ Z: ${Math.round(targetCamZ)} ]`;
  });

  // 6. CLIC Y UI
  window.addEventListener('click', () => {
    if (hoveredPlanet) {
      document.getElementById('pv-title').textContent = hoveredPlanet.userData.name;
      document.getElementById('backdrop').classList.add('show');
      document.getElementById('preview').classList.add('show');
    }
  });

  document.getElementById('pv-close').addEventListener('click', () => {
    document.getElementById('backdrop').classList.remove('show');
    document.getElementById('preview').classList.remove('show');
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // 7. BUCLE DE ANIMACIÓN
  function animate() {
    requestAnimationFrame(animate);

    // Suavizado del movimiento de la cámara (Interpolación Lineal)
    camera.position.z += (targetCamZ - camera.position.z) * 0.08;
    camera.lookAt(0, 0, 0); // Mirar siempre al centro

    // Órbitas de los planetas
    planets.forEach(planet => {
      const data = planet.userData;
      data.angle += data.speed;
      // Rotar los planetas en el plano XZ
      planet.position.x = Math.cos(data.angle) * data.orbit;
      planet.position.z = Math.sin(data.angle) * data.orbit;
      
      // Hacer que el propio planeta gire sobre su eje
      planet.rotation.y += 0.01;
      planet.rotation.x += 0.005;
    });

    // Detectar intersecciones del ratón con los planetas
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(planets);
    
    if (intersects.length > 0) {
      if (hoveredPlanet !== intersects[0].object) {
        hoveredPlanet = intersects[0].object;
      }
    } else {
      hoveredPlanet = null;
    }

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
